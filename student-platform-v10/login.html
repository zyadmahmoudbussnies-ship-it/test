<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>منصة أ. أمينة | تسجيل الدخول</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
/* ─── Login page premium override ─── */
body{margin:0;overflow:hidden;}
.login-wrap{
  min-height:100vh;display:grid;grid-template-columns:1.1fr 1fr;
  position:relative;z-index:1;
}

/* Left: full-bleed teacher photo side */
.l-photo{position:relative;overflow:hidden;}
.l-photo img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;object-position:center top;
  animation:scaleIn 1.2s cubic-bezier(.22,1,.36,1) both;
}
@keyframes scaleIn{from{transform:scale(1.06);}to{transform:scale(1);}}
.l-photo .grad{
  position:absolute;inset:0;
  background:
    linear-gradient(to left, rgba(6,9,18,.85) 0%, rgba(6,9,18,.15) 35%, transparent 60%),
    linear-gradient(to top, rgba(6,9,18,.65) 0%, transparent 30%);
}
/* Animated grid lines on photo side */
.l-photo .grid-ov{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
  background-size:50px 50px;
  animation:gridFade 1s ease both;
}
@keyframes gridFade{from{opacity:0;}to{opacity:1;}}
/* Teacher info overlay — just the contact pill, kept clear of the photo's own caption */
.l-info{
  position:absolute;top:44%;left:32px;transform:translateY(-50%);
  animation:slideUp .8s .3s cubic-bezier(.22,1,.36,1) both;
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}
.l-contact{
  display:inline-flex;align-items:center;gap:9px;
  background:rgba(6,9,18,.7);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.12);border-radius:999px;
  padding:11px 20px;font-size:.85rem;color:rgba(255,255,255,.8);
  text-decoration:none;transition:border-color .2s,background .2s,transform .2s;
}
.l-contact:hover{border-color:rgba(242,181,68,.4);background:rgba(242,181,68,.08);transform:translateY(-2px);}
.l-contact strong{color:#F2B544;font-family:'Cairo',sans-serif;direction:ltr;}

/* Right: login form */
.l-form-side{
  background:linear-gradient(160deg,#0D1425 0%,#060912 100%);
  display:flex;align-items:center;justify-content:center;
  padding:40px;position:relative;overflow:hidden;
}
/* Ambient glow behind form */
.l-form-side::before{
  content:"";position:absolute;
  width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(242,181,68,.08),transparent 65%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;
  animation:ambPulse 4s ease-in-out infinite;
}
@keyframes ambPulse{0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1);}50%{opacity:1;transform:translate(-50%,-50%) scale(1.1);}}

.form-box{
  width:100%;max-width:420px;position:relative;z-index:1;
  animation:formIn .8s .1s cubic-bezier(.22,1,.36,1) both;
}
@keyframes formIn{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:none;}}

.form-logo{
  width:52px;height:52px;border-radius:16px;
  background:linear-gradient(135deg,#F2B544,#e09020);
  display:flex;align-items:center;justify-content:center;font-size:1.5rem;
  box-shadow:0 0 0 1px rgba(242,181,68,.2),0 12px 28px -8px rgba(242,181,68,.5);
  margin-bottom:24px;
}
.form-eyebrow{color:#F2B544;font-weight:700;font-size:.78rem;letter-spacing:.08em;margin-bottom:8px;display:block;}
.form-box h1{font-family:'Cairo',sans-serif;font-weight:900;font-size:2rem;margin-bottom:6px;}
.form-box .sub{color:rgba(138,155,192,1);font-size:.9rem;margin-bottom:32px;}

/* Input fields - premium style */
.field{margin-bottom:20px;}
.field label{display:block;font-size:.8rem;font-weight:700;color:rgba(138,155,192,.9);margin-bottom:9px;letter-spacing:.03em;}
.input-wrap{position:relative;}
.input-wrap input{
  width:100%;padding:14px 18px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;color:#EEE9DF;font-size:.97rem;
  font-family:'Tajawal',sans-serif;outline:none;
  transition:border-color .25s,background .25s,box-shadow .25s;
}
.input-wrap input::placeholder{color:rgba(138,155,192,.4);}
.input-wrap input:focus{
  border-color:rgba(242,181,68,.5);
  background:rgba(242,181,68,.04);
  box-shadow:0 0 0 4px rgba(242,181,68,.08),0 8px 24px -8px rgba(0,0,0,.3);
}
/* Animated focus indicator */
.input-line{
  position:absolute;bottom:0;left:50%;right:50%;
  height:2px;background:linear-gradient(90deg,var(--amber,#F2B544),#2DD4BF);
  border-radius:2px;
  transition:left .3s cubic-bezier(.22,1,.36,1),right .3s cubic-bezier(.22,1,.36,1);
  pointer-events:none;
}
.input-wrap input:focus ~ .input-line{left:12px;right:12px;}

/* Submit button */
.submit-btn{
  width:100%;padding:15px;border-radius:14px;border:none;
  background:linear-gradient(135deg,#F2B544,#e09020);
  color:#1A0F00;font-weight:800;font-family:'Cairo',sans-serif;font-size:1.05rem;
  cursor:pointer;margin-top:8px;position:relative;overflow:hidden;
  box-shadow:0 0 0 1px rgba(242,181,68,.2),0 12px 28px -10px rgba(242,181,68,.6);
  transition:transform .2s,box-shadow .2s,filter .2s;
}
.submit-btn::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);
  opacity:0;transition:opacity .2s;
}
.submit-btn:hover{transform:translateY(-2px);filter:brightness(1.08);box-shadow:0 0 0 1px rgba(242,181,68,.3),0 18px 32px -10px rgba(242,181,68,.75);}
.submit-btn:hover::before{opacity:1;}
.submit-btn:active{transform:translateY(0);}

/* Error box */
.err-box{
  background:rgba(226,87,76,.08);color:#F87171;
  border:1px solid rgba(226,87,76,.25);border-radius:12px;
  padding:13px 16px;font-size:.87rem;margin-bottom:18px;
  display:none;animation:errShake .4s cubic-bezier(.36,.07,.19,.97) both;
}
.err-box.show{display:block;}
@keyframes errShake{10%,90%{transform:translateX(-2px);}20%,80%{transform:translateX(4px);}30%,50%,70%{transform:translateX(-4px);}40%,60%{transform:translateX(4px);}}

.form-foot{margin-top:22px;text-align:center;color:rgba(138,155,192,.7);font-size:.84rem;}
.form-foot a{color:#F2B544;font-weight:700;transition:opacity .15s;}
.form-foot a:hover{opacity:.8;}
.back-link{display:block;margin-top:10px;color:rgba(138,155,192,.5);font-size:.8rem;transition:color .2s;}
.back-link:hover{color:rgba(138,155,192,.9);}
.spinner{width:20px;height:20px;border-radius:50%;border:2.5px solid rgba(26,15,0,.3);border-top-color:#1A0F00;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:820px){
  body{overflow:auto;}
  .login-wrap{grid-template-columns:1fr;}
  .l-photo{height:300px;position:relative;}
  .l-info{display:none;}
  .l-form-side{padding:30px 24px;}
}
</style>
</head>
<body>
<div class="login-wrap">

  <!-- Photo side -->
  <div class="l-photo">
    <img src="teacher.jpg" alt="أ. أمينة"/>
    <div class="grad"></div>
    <div class="grid-ov"></div>

    <div class="l-info">
      <a class="l-contact" href="tel:+201061073897">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
        للتواصل: <strong>+201061073897</strong>
      </a>
    </div>
  </div>

  <!-- Form side -->
  <div class="l-form-side">
    <div class="form-box">
      <div class="form-logo">⚡</div>
      <span class="form-eyebrow">أهلاً بيك من جديد</span>
      <h1>تسجيل الدخول</h1>
      <p class="sub">دخّل اسم المستخدم وكلمة السر اللي معاك</p>

      <div class="err-box" id="errorBox"></div>

      <form id="loginForm">
        <div class="field">
          <label>اسم المستخدم</label>
          <div class="input-wrap">
            <input type="text" id="username" placeholder="مثال: ahmed_2026" autocomplete="username" required/>
            <div class="input-line"></div>
          </div>
        </div>
        <div class="field">
          <label>كلمة السر</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required/>
            <div class="input-line"></div>
          </div>
        </div>
        <button type="submit" class="submit-btn" id="loginBtn">
          <span id="loginBtnText">تسجيل الدخول</span>
        </button>
      </form>

      <p class="form-foot">
        نسيت بياناتك؟ تواصل مع أ. أمينة على
        <a href="tel:+201061073897" style="direction:ltr;unicode-bidi:embed;display:inline-block;">+201061073897</a>
      </p>
      <a href="index.html" class="form-foot back-link">← الرجوع للصفحة الرئيسية</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js?v=2"></script>
<script src="js/login.js?v=2"></script>
</body>
</html>
