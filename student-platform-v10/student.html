<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>منصة أ. أمينة | دروسي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css?v=2"/>
  <link rel="icon" href="data:,">
</head>
<body>
  <div class="center-screen" id="loadingScreen"><div class="spinner"></div></div>

  <div class="app-shell" id="appShell" style="display:none;">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <span class="mark">⚡</span>
        <span>منصة أ. أمينة</span>
      </div>
      <nav>
        <button class="nav-link active"><span>🎬</span><span>دروسي</span></button>
      </nav>
      <div class="sidebar-foot">
        <div class="user-chip">
          <div class="avatar" id="avatarInitial">?</div>
          <div class="meta">
            <div class="name" id="sideUsername">—</div>
            <div class="role">طالب</div>
          </div>
        </div>
        <button class="btn btn-ghost btn-block" onclick="logout()">تسجيل الخروج</button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="brand"><span class="mark">⚡</span><span>منصة أ. أمينة</span></div>
        <div class="topbar-actions">
          <button class="icon-btn" onclick="document.getElementById('sidebar').classList.toggle('open');document.body.classList.toggle('sidebar-open')">☰</button>
          <button class="icon-btn" onclick="logout()">⎋</button>
        </div>
      </div>
      <div class="main-header">
        <div>
          <h1>أهلاً <span id="welcomeName">بيك</span> 👋</h1>
          <p class="subtitle">دي قائمة الدروس المتاحة لك</p>
        </div>
        <div id="statusBadge"></div>
      </div>

      <div class="panel" id="inactivePanel" style="display:none;">
        <div class="empty-state">
          <div class="glyph">🔒</div>
          <h3>حسابك لسه مش مفعّل</h3>
          <p>تواصل مع أ. أمينة على <strong style="direction:ltr;unicode-bidi:embed;display:inline-block;">+201061073897</strong> لتفعيل حسابك.</p>
        </div>
      </div>
      <div class="panel" id="emptyPanel" style="display:none;">
        <div class="empty-state">
          <div class="glyph">🎞️</div>
          <h3>لسه مفيش دروس متاحة ليك</h3>
          <p>هتظهر هنا أول ما أ. أمينة تضيف درس جديد ليك.</p>
        </div>
      </div>
      <div class="video-grid" id="videoGrid"></div>

      <div id="materialsSection" style="display:none;margin-top:36px;">
        <h2 class="section-title" style="margin-bottom:16px;">📄 الملفات</h2>
        <div class="material-grid" id="materialGrid"></div>
      </div>
    </main>
  </div>

  <div class="player-backdrop" id="playerBackdrop">
    <div class="player-box">
      <button class="player-close" id="playerClose">✕</button>
      <div class="ratio" id="playerSlot"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js?v=2"></script>
  <script src="js/student.js?v=2"></script>
  <script>
  (function(){
    var sb=document.getElementById('sidebar');
    document.addEventListener('click',function(e){
      if(sb.classList.contains('open') && !sb.contains(e.target) && !e.target.closest('.icon-btn')){
        sb.classList.remove('open'); document.body.classList.remove('sidebar-open');
      }
    });
    document.querySelectorAll('.nav-link').forEach(function(btn){
      btn.addEventListener('click',function(){
        if(window.innerWidth<768){ sb.classList.remove('open'); document.body.classList.remove('sidebar-open'); }
      });
    });
  })();
  </script>
</body>
</html>
